<!DOCTYPE html>
<html lang="en">
<head>
  <title>cricket game</title>
  <link rel="stylesheet" href="cricket.css">
  <style>
  
   
  </style>
</head>
<body>
  <h1>Bat Ball And Stump</h1>
  

  <button id="choice-button" onclick="
        
      let ResultMSG;
      let computerChoice= generatComoputerChoice();
      ResultMSG= getResult('Bat' , computerChoice);
      showResult('Bat' , computerChoice ,ResultMSG)
        
  "><img id="choice-image" src="images/bat.png" alt=""></button>

  <button id="choice-button" onclick="
    
       computerChoice= generatComoputerChoice();
          ResultMSG=getResult('Ball' , computerChoice);
         showResult('Ball' , computerChoice , ResultMSG)
  
   "><img id="choice-image" src="images/Ball.png" alt=""></button>

   <button id="choice-button" onclick="
    
      computerChoice=generatComoputerChoice();
         ResultMSG=getResult('Stump' , computerChoice)     
        showResult('Stump' , computerChoice , ResultMSG)
         
  "><img id="choice-image" src="images/stump.png" alt=""></button>

  

  <h2 id="user_move"></h2>
  <h2 id="computer_move"></h2>
  <h2 id="result"></h2>
  <h2 id="score"></h2>

  <button onclick="
    localStorage.clear()
   resetScore();
  
  ">Reset</button>
  
  <script>
         let score;
      let scoreStr=localStorage.getItem('score');
      // console.log(scoreStr);
      
      //
      resetScore(scoreStr);
      function resetScore(scoreStr){
      score=scoreStr ? JSON.parse(scoreStr) :  {
            win:0,
            lost:0,
            tie:0,
          };
          
       score.DisplayScore=function(){
           return `   win:${score.win} , lost: ${score.lost} , tie: ${score.tie}`;
      }

      showResult();
    };
    
    
     
    function generatComoputerChoice() {
      
          let random=Math.random()*3;
        if(random > 0 && random <= 1){
          return 'Bat';
        }else if(random > 1 && random <= 2){
         return 'Ball';
        }else{
          return 'Stump';
        }
    }
    function getResult(userMove , computerMove){
          if(userMove==='Bat'){
          if(computerMove==='Bat'){
            score.tie++;
         return'Its a tie';
        }else if(computerMove==='Ball'){
          score.win++;
          return'User won';
        }else if(computerMove==='Stump'){
          score.lost++;
          return'computer has won';
        }
        }
        if(userMove==='Ball'){
            if(computerMove==='Ball'){
              score.tie++;
            return'Its a tie';
          }else if(computerMove==='Bat'){
            score.lost++;
            return'computer has won';
          }else if(computerMove==='Stump'){
            score.win++;
            return'user won';
          } 
        }
        if(userMove==='Stump'){
          if(computerMove==='Stump'){
            score.tie++;
        return'Its a tie';
        }else if(computerMove==='Ball'){
          score.lost++;
          return'computer has won';
        }else if(computerMove==='Bat'){
          score.win++;
          return'User won';
        }
        }
    };
        
    function showResult(userMove, computerMove , result){

     localStorage.setItem('score',JSON.stringify( score));

     document.querySelector('#user_move').innerText=
      userMove  ? `you have chosen a ${userMove}` : '';

    document.querySelector('#computer_move'). innerText=
  computerMove ? `computerchoice is ${computerMove}` : '';

     document.querySelector('#result').innerText=
     result  || '';

     document.querySelector('#score').innerText=
     score.DisplayScore();


    }
    
  </script>
</body>
</html>
