<!DOCTYPE html>
<html lang="en">
<head>
  <title>practice exercise</title>
  <style>
    #my-button{
     
     
      height: 50px;
      width: 60px;
      font-size: xx-large;
      border-radius: 10px;
    }
    .js-odd{
      background-color: chocolate;
    }
    .js-even{
      background-color: blue;
    }
  </style>
</head>
<body>
  <h3 id="greating"></h3>

  <button id="my-button" onclick="buttonpressed();"></button>
  <script>
     let noOFTimeClick = localStorage.getItem('noOFTimeClick') ||
     0;
    function buttonpressed(){
        noOFTimeClick++;
        localStorage.setItem('noOFTimeClick' , noOFTimeClick);
        updateButton();
    };
    function updateButton(){
           let button = document.querySelector('#my-button');
         if(noOFTimeClick % 2===0){
            button.classList.remove('js-odd');
             button.classList.add('js-even');
        }else{
             button.classList.remove('js-even');
             button.classList.add('js-odd');
        }
        button.innerText = noOFTimeClick;

        
    };

      updateButton();
   





















   
   function dogreating(personName='omais'){
    let date = new Date();
        
        let hour = date.getHours();

        // let hour = 17;

        let heading =document.querySelector('#greating');

        // console.log(hour);

        if(hour > 5 &&  hour < 12){
          heading.innerText=`Good Morning ${personName}`;

        } else if (hour > 12 && hour < 18){
          heading.innerText=`Good Afternoon ${personName}`;
          
        }else{
          heading.innerText=`Good Night ${personName}`;
        };
      };

    dogreating('zeeshan ');


    
    
  </script>

</body>
</html>
